<!doctype html>
<html>
  <head>
    <title>Scan Uang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
      }

      .container {
        max-width: 420px;
        margin: auto;
        padding: 15px;
      }

      h2 {
        text-align: center;
        margin-bottom: 5px;
      }

      .subtitle {
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 15px;
      }

      .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 14px;
        margin-bottom: 15px;
      }

      video,
      img {
        width: 100%;
        border-radius: 12px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      .scan {
        background: #22c55e;
        color: white;
      }

      .switch {
        background: #3b82f6;
        color: white;
      }

      #status {
        text-align: center;
        margin-top: 10px;
        font-weight: bold;
      }

      /* 🔥 SUMMARY */
      .summary p {
        margin: 5px 0;
        font-size: 14px;
      }

      /* HISTORY GRID */
      #historyList {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .history-card {
        background: #1e293b;
        padding: 8px;
        border-radius: 10px;
        text-align: center;
      }

      .history-card img {
        width: 100%;
        border-radius: 8px;
      }

      .history-card p {
        font-size: 12px;
        margin: 4px 0;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>💸 Scan Uang</h2>
      <p class="subtitle">Gunakan cahaya dari belakang 🔦</p>

      <!-- 🔥 SUMMARY -->
      <div class="card summary">
        <h3>📊 Summary</h3>
        <p>Total: <span id="total">0</span></p>
        <p style="color: lightgreen">Asli: <span id="asli">0</span></p>
        <p style="color: yellow">
          Kemungkinan: <span id="kemungkinan">0</span>
        </p>
        <p style="color: red">Palsu: <span id="palsu">0</span></p>
      </div>

      <!-- CAMERA -->
      <div class="card">
        <video id="video" autoplay playsinline></video>

        <button class="scan" onclick="capture()">📸 Scan Sekarang</button>
        <button class="switch" onclick="switchCamera()">🔄 Ganti Kamera</button>

        <p id="status">Status: siap scan</p>
      </div>

      <!-- RESULT -->
      <div class="card">
        <img id="result" />
      </div>

      <!-- HISTORY -->
      <div class="card">
        <h3>📊 History</h3>
        <div id="historyList"></div>
      </div>
    </div>

    <canvas id="canvas" style="display: none"></canvas>

    <script>
      let video = document.getElementById("video");
      let currentStream;
      let useFrontCamera = false;

      async function startCamera() {
        if (currentStream) {
          currentStream.getTracks().forEach((track) => track.stop());
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: useFrontCamera ? "user" : "environment" },
        });

        video.srcObject = stream;
        currentStream = stream;
      }

      function switchCamera() {
        useFrontCamera = !useFrontCamera;
        startCamera();
      }

      function capture() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const imageData = canvas.toDataURL("image/png");

        document.getElementById("status").innerText = "Scanning...";

        fetch("/scan-uang", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageData }),
        })
          .then((res) => res.json())
          .then((data) => {
            const status = document.getElementById("status");

            status.innerText = `Hasil: ${data.hasil} (${data.confidence.toFixed(2)})`;

            if (data.hasil === "asli") status.style.color = "lightgreen";
            else if (data.hasil === "kemungkinan asli")
              status.style.color = "yellow";
            else status.style.color = "red";

            ctx.drawImage(video, 0, 0);

            if (data.box) {
              const [x, y, w, h] = data.box;
              ctx.strokeStyle = "red";
              ctx.lineWidth = 3;
              ctx.strokeRect(x, y, w, h);
            }

            document.getElementById("result").src = canvas.toDataURL();

            loadHistory();
            loadSummary(); // 🔥 update counter
          })
          .catch(() => {
            alert("Gagal scan");
          });
      }

      // 🔥 HISTORY
      function loadHistory() {
        fetch("/history")
          .then((res) => res.json())
          .then((data) => {
            const container = document.getElementById("historyList");
            container.innerHTML = "";

            data.forEach((item) => {
              let color =
                item.result === "asli"
                  ? "lightgreen"
                  : item.result === "kemungkinan asli"
                    ? "yellow"
                    : "red";

              container.innerHTML += `
                <div class="history-card">
                  <img src="${item.image}" />
                  <p style="color:${color}"><b>${item.result}</b></p>
                  <p>${parseFloat(item.confidence).toFixed(2)}</p>
                </div>
              `;
            });
          });
      }

      // 🔥 SUMMARY
      function loadSummary() {
        fetch("/summary")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("total").innerText = data.total || 0;
            document.getElementById("asli").innerText = data.asli || 0;
            document.getElementById("kemungkinan").innerText =
              data.kemungkinan || 0;
            document.getElementById("palsu").innerText = data.palsu || 0;
          });
      }

      // INIT
      startCamera();
      loadHistory();
      loadSummary();
    </script>
  </body>
</html>
